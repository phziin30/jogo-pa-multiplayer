<div id="overlay">
    <div id="login-box">
        <h1>MATH SLITHER</h1>
        <div class="line"></div>
        
        <div class="input-group">
            <label>NICKNAME</label>
            <input type="text" id="nick-input" placeholder="Teu Nome" maxlength="12">
        </div>

        <div class="input-group">
            <label>DIFICULDADE (MULT. PONTOS)</label>
            <select id="difficulty-input">
                <option value="easy">FÁCIL (1x pts)</option>
                <option value="medium" selected>MÉDIO (2x pts)</option>
                <option value="hard">DIFÍCIL (4x pts)</option>
            </select>
        </div>

        <div class="input-group">
            <label>COR DA COBRA</label>
            <input type="color" id="color-input" value="#00ffcc">
        </div>

        <button id="btn-play">ENTRAR NA ARENA</button>
        <p id="status-msg">A ligar ao servidor...</p>
    </div>
</div>
